<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBSCURE MESSENGER</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #4f46e5; --bg: #ffffff; --text: #0f172a; --secondary: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; background: #e2e8f0; margin: 0; display: flex; justify-content: center; height: 100vh; font-weight: 700; }
        .app-shell { width: 100%; max-width: 450px; height: 100vh; background: var(--bg); display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .page { padding: 30px; display: none; height: 100%; flex-direction: column; overflow-y: auto; }
        .active { display: flex; }
        
        .brand { font-size: 1.6rem; font-weight: 900; color: var(--primary); text-align: center; margin: 30px 0; }
        h2, h3 { font-weight: 800; color: var(--text); margin-top: 0; }
        
        input { background: var(--secondary); border: 2px solid transparent; padding: 18px; border-radius: 16px; margin: 10px 0; outline: none; width: 100%; box-sizing: border-box; font-weight: 700; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        button { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 16px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 10px; }
        
        .user-card { background: var(--secondary); padding: 15px 20px; border-radius: 16px; margin: 10px 0; cursor: pointer; display: flex; align-items: center; gap: 15px; }
        
        #msg-area { flex: 1; display: flex; flex-direction: column; gap: 10px; padding: 10px 0; overflow-y: auto; }
        .msg { padding: 12px 18px; border-radius: 20px; max-width: 75%; font-size: 0.95rem; font-weight: 600; line-height: 1.4; display: flex; align-items: flex-end; gap: 8px; }
        .sent { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .received { background: var(--secondary); color: var(--text); align-self: flex-start; border-bottom-left-radius: 4px; }
        
        /* Ticks Style */
        .tick { font-size: 0.75rem; font-weight: 900; }
        .tick.delivered { color: #34d399; }
        .tick.sent-only { color: #a5b4fc; }
        
        .error { color: red; font-size: 0.85rem; text-align: center; margin-top: 5px; display: none; }
        
        /* Avatar Style */
        .avatar { width: 85px; height: 85px; background: #e0e7ff; color: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: 900; margin: 0 auto 20px; cursor: pointer; overflow: hidden; }
    </style>
</head>
<body>

<div class="app-shell">
    <div id="login" class="page active">
        <div class="brand">OBSCURE MESSENGER</div>
        <h2>Sign In</h2>
        <input type="text" id="log-id" placeholder="Email or Username">
        <input type="password" id="log-pass" placeholder="Password">
        <div id="log-error" class="error"></div>
        <button onclick="loginUser()">Login</button>
        <p onclick="resetPassword()" style="text-align:center; color:var(--text); cursor:pointer; font-size:0.9rem; margin-top:15px; opacity: 0.8;">Forgot Password?</p>
        <p onclick="navTo('reg')" style="text-align:center; color:var(--primary); cursor:pointer; margin-top:10px;">Create New Account</p>
    </div>

    <div id="reg" class="page">
        <div class="brand">OBSCURE MESSENGER</div>
        <h2>Register</h2>
        <input type="email" id="reg-email" placeholder="Email">
        <input type="text" id="reg-user" placeholder="Username (e.g. muhib)">
        <input type="password" id="reg-pass" placeholder="Password">
        <div id="reg-error" class="error"></div>
        <button onclick="registerUser()">Register</button>
    </div>

    <div id="dash" class="page">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>Chats</h2>
            <div class="avatar" id="nav-avatar" onclick="navTo('profile')" style="width:45px; height:45px; font-size:1.2rem; margin:0;">P</div>
        </div>
        <input type="text" id="search" placeholder="Search username to message..." onkeyup="searchUsers()">
        <div id="results"></div>
    </div>

    <div id="profile" class="page">
        <h2>My Profile</h2>
        <div class="avatar" id="profile-avatar" onclick="document.getElementById('file-in').click()">P</div>
        <input type="file" id="file-in" onchange="previewImage(event)" style="display:none;" accept="image/*">
        
        <div style="background: var(--secondary); padding: 20px; border-radius: 20px; margin: 10px 0; text-align:center; font-size: 1.2rem;">
            Username: <span id="view-user" style="color:var(--primary);">@username</span>
        </div>
        
        <button onclick="logout()" style="background: #ef4444; margin-top: 30px;">Logout</button>
    </div>

    <div id="chat" class="page">
        <h3 id="chat-title" style="margin:0; padding-bottom: 15px; border-bottom: 1px solid #e2e8f0; text-align:center;">User</h3>
        <div id="msg-area"></div>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <input type="text" id="msg-in" placeholder="Message..." style="margin:0; flex:1;">
            <button onclick="sendMessage()" style="width:auto; margin:0; padding:0 25px;">Send</button>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // 1. FIREBASE CONFIGURATION
    // ==========================================
const firebaseConfig = {
  apiKey: "AIzaSyAaKwQgPjcGCbBdXJ_64_sOYltOp1pEfn0",
  authDomain: "my-obscure.firebaseapp.com",
  projectId: "my-obscure",
  storageBucket: "my-obscure.firebasestorage.app",
  messagingSenderId: "969641763818",
  appId: "1:969641763818:web:3c5d39fae9cab26949c893",
  measurementId: "G-JKS18RDR8W"
};
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // ==========================================
    // 2. STATE VARIABLES
    // ==========================================
    let currentUser = null;
    let currentChatUserId = null;
    let activeChatListener = null;
    let isRegistering = false; 

    // ==========================================
    // 3. NAVIGATION 
    // ==========================================
    function navTo(pageId) {
        history.pushState({ id: pageId }, null, ""); 
        renderPage(pageId);
    }

    function renderPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        
        if(pageId === 'dash') {
            document.getElementById('search').value = "";
            if (typeof historyUsers !== 'undefined') displayUsers(historyUsers);
        }
    }

    window.onpopstate = (event) => {
        if (currentUser) {
            if (!event.state || event.state.id === 'login' || event.state.id === 'reg') {
                renderPage('dash');
                history.replaceState({ id: 'dash' }, null, "");
            } else {
                renderPage(event.state.id);
            }
        } else {
            if (event.state && event.state.id) {
                renderPage(event.state.id);
            } else {
                renderPage('login');
            }
        }
    };

    // ==========================================
    // 4. AUTHENTICATION & PROFILE DATA
    // ==========================================
    auth.onAuthStateChanged(user => {
        if (isRegistering) return; 
        
        if (user) {
            // ইমেইল ভেরিফাই করা না থাকলে অটো-লগিন ব্লক করা হলো
            if (!user.emailVerified) {
                auth.signOut();
                return;
            }

            currentUser = user;
            
            db.collection("users").doc(currentUser.uid).get().then(doc => {
                if(doc.exists) {
                    const data = doc.data();
                    document.getElementById('view-user').innerText = `@${data.username}`;
                    
                    let avatarContent = data.username[0].toUpperCase();
                    if(data.profilePic) {
                        avatarContent = `<img src="${data.profilePic}" style="width:100%; height:100%; object-fit:cover;">`;
                    }
                    document.getElementById('profile-avatar').innerHTML = avatarContent;
                    document.getElementById('nav-avatar').innerHTML = avatarContent;
                }
            });

            history.replaceState({ id: 'dash' }, null, "");
            renderPage('dash');
            loadAllUsers(); 
        } else {
            currentUser = null;
            history.replaceState({ id: 'login' }, null, "");
            renderPage('login');
        }
    });

    async function registerUser() {
        const email = document.getElementById('reg-email').value.trim();
        const username = document.getElementById('reg-user').value.trim().toLowerCase();
        const pass = document.getElementById('reg-pass').value;
        const err = document.getElementById('reg-error');

        if(!email || !username || !pass) { 
            err.style.color = "red";
            err.innerText = "All fields required!"; 
            err.style.display = "block"; 
            return; 
        }

        try {
            isRegistering = true; 

            const userCheck = await db.collection("users").where("username", "==", username).get();
            if(!userCheck.empty) { 
                isRegistering = false;
                err.style.color = "red";
                err.innerText = "Username already taken!"; 
                err.style.display = "block"; 
                return; 
            }

            const cred = await auth.createUserWithEmailAndPassword(email, pass);
            
            // ইমেইল ভেরিফিকেশন লিংক পাঠানো হচ্ছে
            await cred.user.sendEmailVerification();
            
            await db.collection("users").doc(cred.user.uid).set({
                uid: cred.user.uid,
                email: email,
                username: username,
                chattedWith: []
            });
            
            await auth.signOut(); 
            
            err.style.color = "green";
            err.innerText = "Registration Successful! Please check your email inbox to verify your account.";
            err.style.display = "block";

            setTimeout(() => {
                isRegistering = false; 
                document.getElementById('reg-email').value = "";
                document.getElementById('reg-user').value = "";
                document.getElementById('reg-pass').value = "";
                err.style.display = "none";
                navTo('login');
            }, 3500); // মেসেজটি পড়ার জন্য একটু বেশি সময় দেওয়া হলো

        } catch (error) {
            isRegistering = false;
            err.style.color = "red";
            err.innerText = error.message;
            err.style.display = "block";
        }
    }

    async function loginUser() {
        const loginId = document.getElementById('log-id').value.trim().toLowerCase();
        const pass = document.getElementById('log-pass').value;
        const err = document.getElementById('log-error');

        if(!loginId || !pass) return;
        let emailToLogin = loginId;

        try {
            if (!loginId.includes('@')) {
                const snapshot = await db.collection("users").where("username", "==", loginId).get();
                if (snapshot.empty) { throw new Error("Username not found!"); }
                emailToLogin = snapshot.docs[0].data().email;
            }
            
            const cred = await auth.signInWithEmailAndPassword(emailToLogin, pass);
            
            // লগিন করার সময় চেক করবে ইমেইল ভেরিফাই হয়েছে কি না
            if (!cred.user.emailVerified) {
                await auth.signOut();
                throw new Error("Please verify your email before logging in. Check your inbox/spam.");
            }

            err.style.display = "none";
        } catch (error) {
            err.style.color = "red";
            err.innerText = error.message;
            err.style.display = "block";
        }
    }

    // পাসওয়ার্ড রিসেট করার ফাংশন
    async function resetPassword() {
        const email = prompt("Enter your registered email address to reset your password:");
        if (!email) return;
        
        try {
            await auth.sendPasswordResetEmail(email.trim());
            alert("A password reset link has been sent to your email. Please check your inbox/spam folder.");
        } catch (error) {
            alert("Error: " + error.message);
        }
    }

    function logout() { auth.signOut(); }

    function previewImage(e) {
        const file = e.target.files[0];
        if(!file) return;
        
        const reader = new FileReader();
        reader.onload = async (ev) => { 
            const imgData = ev.target.result;
            const imgTag = `<img src="${imgData}" style="width:100%; height:100%; object-fit:cover;">`; 
            
            document.getElementById('profile-avatar').innerHTML = imgTag; 
            document.getElementById('nav-avatar').innerHTML = imgTag; 
            
            await db.collection("users").doc(currentUser.uid).update({
                profilePic: imgData
            });
        };
        reader.readAsDataURL(file);
    }

    // ==========================================
    // 5. SEARCH & LOAD USERS 
    // ==========================================
    let allUsers = [];
    let historyUsers = [];

    async function loadAllUsers() {
        const snap = await db.collection("users").get();
        allUsers = snap.docs.map(doc => doc.data()).filter(u => u.uid !== currentUser.uid);
        
        const meDoc = await db.collection("users").doc(currentUser.uid).get();
        const myData = meDoc.data();
        const chattedWithArray = myData.chattedWith || [];
        
        historyUsers = allUsers.filter(u => chattedWithArray.includes(u.uid));
        displayUsers(historyUsers);
    }

    function searchUsers() {
        const q = document.getElementById('search').value.toLowerCase().trim();
        if (!q) { displayUsers(historyUsers); return; }
        
        const filtered = allUsers.filter(u => u.username.startsWith(q));
        displayUsers(filtered);
    }

    async function displayUsers(usersList) {
        const results = document.getElementById('results');
        if (usersList.length === 0) {
            results.innerHTML = `<div style="text-align:center; color:gray; margin-top:20px;">No chats found</div>`;
            return;
        }
        
        let html = "";
        for (let u of usersList) {
            let lastMsg = "Tap to message"; 
            
            if (historyUsers.find(hu => hu.uid === u.uid)) {
                const chatId = getChatId(currentUser.uid, u.uid);
                const chatDoc = await db.collection("chats").doc(chatId).get();
                if (chatDoc.exists && chatDoc.data().lastMessage) {
                    lastMsg = chatDoc.data().lastMessage;
                    if(lastMsg.length > 25) lastMsg = lastMsg.substring(0,25) + "..."; 
                }
            }

            let avatarHtml = u.profilePic 
                ? `<img src="${u.profilePic}" style="width:100%; height:100%; object-fit:cover;">` 
                : u.username[0].toUpperCase();

            html += `
            <div class="user-card" onclick="openChat('${u.uid}', '${u.username}')">
                <div class="avatar" style="width:50px; height:50px; font-size:1.5rem; margin:0;">${avatarHtml}</div>
                <div style="flex:1; margin-left:15px; overflow: hidden;">
                    <div style="font-size: 1.1rem;"><strong>@${u.username}</strong></div>
                    <div style="color:gray; font-size:0.9rem; margin-top:5px; white-space: nowrap; text-overflow: ellipsis; overflow: hidden;">${lastMsg}</div>
                </div>
            </div>`;
        }
        results.innerHTML = html;
    }

    // ==========================================
    // 6. MESSAGING (Fast Loading Version)
    // ==========================================
    function getChatId(uid1, uid2) {
        return uid1 < uid2 ? `${uid1}_${uid2}` : `${uid2}_${uid1}`;
    }

    function openChat(targetUid, targetUsername) {
        currentChatUserId = targetUid;
        document.getElementById('chat-title').innerText = `@${targetUsername}`;
        document.getElementById('msg-area').innerHTML = `<div style="text-align:center; color:gray; margin-top:20px; font-size:0.85rem;">Loading messages...</div>`;
        navTo('chat');

        const chatId = getChatId(currentUser.uid, targetUid);

        if(activeChatListener) activeChatListener();

        activeChatListener = db.collection("chats").doc(chatId).collection("messages")
            .orderBy("timestamp")
            .limitToLast(50) 
            .onSnapshot(snapshot => {
                
                let htmlString = ""; 
                
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const isMe = data.sender === currentUser.uid;
                    
                    if (!isMe && data.status === 'sent') {
                        doc.ref.update({ status: 'delivered' });
                    }

                    let ticks = "";
                    if (isMe) {
                        if (data.status === 'sent') ticks = `<span class="tick sent-only">✓</span>`;
                        if (data.status === 'delivered') ticks = `<span class="tick delivered">✓✓</span>`;
                    }

                    const cssClass = isMe ? 'sent' : 'received';
                    htmlString += `<div class="msg ${cssClass}">
                        <span>${data.text}</span> ${ticks}
                    </div>`;
                });
                
                let area = document.getElementById('msg-area');
                area.innerHTML = htmlString;
                area.scrollTop = area.scrollHeight;
            });
    }

    async function sendMessage() {
        const input = document.getElementById('msg-in');
        const text = input.value.trim();
        if(!text || !currentChatUserId) return;

        const chatId = getChatId(currentUser.uid, currentChatUserId);
        
        await db.collection("chats").doc(chatId).collection("messages").add({
            text: text,
            sender: currentUser.uid,
            receiver: currentChatUserId,
            status: "sent", 
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });

        await db.collection("chats").doc(chatId).set({
            lastMessage: text,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
        
        await db.collection("users").doc(currentUser.uid).update({
            chattedWith: firebase.firestore.FieldValue.arrayUnion(currentChatUserId)
        });
        await db.collection("users").doc(currentChatUserId).update({
            chattedWith: firebase.firestore.FieldValue.arrayUnion(currentUser.uid)
        });

        if (!historyUsers.find(u => u.uid === currentChatUserId)) {
            const chatUser = allUsers.find(u => u.uid === currentChatUserId);
            if (chatUser) historyUsers.push(chatUser);
        }
        
        input.value = "";
    }
</script>
</body>
</html>
